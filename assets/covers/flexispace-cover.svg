<text x="64" y="424" font-size="11" fill="#4a7a80" letter-spacing=".04em">USER RATING</text>
<text x="184" y="404" font-size="36" font-weight="800" fill="#e8f4f2">60%</text>
<text x="184" y="424" font-size="11" fill="#4a7a80" letter-spacing=".04em">LESS DROP-OFF</text>
<text x="316" y="404" font-size="36" font-weight="800" fill="#0E9C8E">3×</text>
<text x="316" y="424" font-size="11" fill="#4a7a80" letter-spacing=".04em">FASTER BOOKING</text>

<!-- Bottom label -->
<text x="64" y="620" font-size="12" fill="#2a5060" font-weight="500" letter-spacing=".12em">CASE STUDY · UI/UX DESIGN</text>

