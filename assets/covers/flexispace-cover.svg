<text x="64" y="300" font-size="100" font-weight="800" fill="#0E9C8E" letter-spacing="-.05em">Space</text>

<!-- Subtitle -->
<text x="66" y="340" font-size="17" fill="#4a7a80" font-weight="400">Workplace experience for hybrid teams</text>

<!-- Divider -->
