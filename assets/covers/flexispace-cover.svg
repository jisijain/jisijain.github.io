<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
<defs>
  <radialGradient id="fsbg" cx="68%" cy="48%" r="72%">
    <stop offset="0%" stop-color="#0c2230"/>
    <stop offset="55%" stop-color="#061018"/>
    <stop offset="100%" stop-color="#030810"/>
  </radialGradient>
  <radialGradient id="fsglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0E9C8E" stop-opacity=".28"/>
    <stop offset="100%" stop-color="#0E9C8E" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="fsring" cx="35%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#0E9C8E"/>
    <stop offset="100%" stop-color="#047a70"/>
  </radialGradient>
  <linearGradient id="fsscreen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0e2030"/>
    <stop offset="100%" stop-color="#071520"/>
  </linearGradient>
  <linearGradient id="fsbadge" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0E9C8E"/>
    <stop offset="100%" stop-color="#0a7870"/>
  </linearGradient>
  <linearGradient id="fscard" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#142838"/>
    <stop offset="100%" stop-color="#0d1e2c"/>
  </linearGradient>
  <pattern id="fsdots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="1" fill="#0E9C8E" fill-opacity=".1"/>
  </pattern>
  <clipPath id="fsclip1"><rect width="256" height="520" rx="36"/></clipPath>
  <clipPath id="fsclip2"><rect width="228" height="468" rx="32"/></clipPath>
  <filter id="fsdrop"><feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000" flood-opacity=".75"/></filter>
  <filter id="fsgf" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="50"/></filter>
</defs>

<!-- BG -->
<rect width="1200" height="700" fill="url(#fsbg)"/>
<rect width="1200" height="700" fill="url(#fsdots)"/>

<!-- Glow behind phones -->
<ellipse cx="780" cy="360" rx="300" ry="220" fill="#0E9C8E" fill-opacity=".18" filter="url(#fsgf)"/>

<!-- ─── LEFT TEXT PANEL ─── -->
<!-- Eyebrow tags -->
<rect x="64" y="76" width="78" height="24" rx="12" fill="#0E9C8E" fill-opacity=".15"/>
<text x="103" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#0E9C8E" letter-spacing=".08em">MOBILE</text>
<rect x="152" y="76" width="52" height="24" rx="12" fill="#0E9C8E" fill-opacity=".15"/>
<text x="178" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#0E9C8E" letter-spacing=".08em">iOS</text>
<rect x="214" y="76" width="120" height="24" rx="12" fill="#4F46E5" fill-opacity=".18"/>
<text x="274" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#818cf8" letter-spacing=".08em">UX RESEARCH</text>

<!-- Title -->
