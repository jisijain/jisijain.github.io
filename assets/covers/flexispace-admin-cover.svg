<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
<defs>
  <radialGradient id="fabg" cx="50%" cy="45%" r="75%">
    <stop offset="0%" stop-color="#1c0608"/>
    <stop offset="55%" stop-color="#0d0507"/>
    <stop offset="100%" stop-color="#050203"/>
  </radialGradient>
  <radialGradient id="faglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#b32434" stop-opacity=".22"/>
    <stop offset="100%" stop-color="#b32434" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="fawin" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1c0a0d"/>
    <stop offset="100%" stop-color="#150608"/>
  </linearGradient>
  <linearGradient id="fared" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#b32434"/>
    <stop offset="100%" stop-color="#7a1420"/>
  </linearGradient>
  <linearGradient id="fachart" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#b32434" stop-opacity=".06"/>
    <stop offset="100%" stop-color="#b32434" stop-opacity=".4"/>
  </linearGradient>
  <linearGradient id="fabar1" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#b32434" stop-opacity=".5"/>
    <stop offset="100%" stop-color="#c8384a"/>
  </linearGradient>
  <linearGradient id="fabar2" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#b32434" stop-opacity=".25"/>
    <stop offset="100%" stop-color="#b32434" stop-opacity=".6"/>
  </linearGradient>
  <clipPath id="faclip"><rect width="984" height="520" rx="12"/></clipPath>
  <filter id="fadrop"><feDropShadow dx="0" dy="32" stdDeviation="40" flood-color="#000" flood-opacity=".85"/></filter>
  <filter id="fagf" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="60"/></filter>
  <filter id="faredglow"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#b32434" flood-opacity=".6"/></filter>
  <pattern id="fadots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="#f4ebe6" fill-opacity=".06"/>
  </pattern>
</defs>

<!-- BG -->
<rect width="1200" height="700" fill="url(#fabg)"/>
<rect width="1200" height="700" fill="url(#fadots)"/>

<!-- Red glow -->
<ellipse cx="600" cy="390" rx="520" ry="280" fill="url(#faglow)" filter="url(#fagf)"/>

<!-- ─── TOP TEXT BAND ─── -->
<rect x="108" y="52" width="100" height="24" rx="12" fill="#b32434" fill-opacity=".18"/>
<text x="158" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#c8384a" letter-spacing=".08em">WEB · SAAS</text>
<rect x="218" y="52" width="112" height="24" rx="12" fill="#b32434" fill-opacity=".18"/>
<text x="274" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#c8384a" letter-spacing=".08em">DASHBOARD</text>
<rect x="340" y="52" width="130" height="24" rx="12" fill="#b32434" fill-opacity=".18"/>
<text x="405" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#c8384a" letter-spacing=".08em">OPERATOR TOOL</text>

<text x="108" y="120" font-size="46" font-weight="800" fill="#f4ebe6" letter-spacing="-.03em">FlexiSpace</text>
<text x="108" y="162" font-size="46" font-weight="300" fill="#c8384a" letter-spacing="-.03em">Admin</text>

