  <filter id="flglow"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#14b8a6" flood-opacity=".4"/></filter>
  <filter id="floorshadow"><feDropShadow dx="4" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".6"/></filter>
  <clipPath id="maincontent"><rect x="270" y="0" width="930" height="700"/></clipPath>
