<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
<defs>
  <linearGradient id="crbg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#0a0e18"/>
  </linearGradient>
  <linearGradient id="crcard" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#161b24"/>
    <stop offset="100%" stop-color="#111620"/>
  </linearGradient>
  <filter id="crglow1"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00d4ff" flood-opacity=".35"/></filter>
  <filter id="crglow2"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffd700" flood-opacity=".35"/></filter>
  <filter id="crglow3"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff4d6d" flood-opacity=".35"/></filter>
  <filter id="crglow4"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00e676" flood-opacity=".35"/></filter>
</defs>

<!-- Background -->
<rect width="1200" height="700" fill="url(#crbg)"/>

<!-- ── TOPBAR ── -->
<rect width="1200" height="54" fill="#161b24"/>
<rect x="0" y="54" width="1200" height="1" fill="rgba(255,255,255,.07)"/>
<text x="28" y="23" font-size="18" font-weight="800" fill="#f0f4ff">IPL Dashboard</text>
<text x="28" y="40" font-size="10" fill="#4a5568">Comprehensive analytics across all IPL seasons</text>
<text x="1070" y="28" font-size="11" fill="#4a5568">Season</text>
<rect x="1104" y="14" width="88" height="28" rx="6" fill="#1e2535" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
<text x="1148" y="32" text-anchor="middle" font-size="11" fill="#e2e8f0">All Seasons</text>
<text x="1184" y="32" font-size="10" fill="#4a5568">▾</text>

<!-- ── STAT CARDS ROW ── -->
<!-- Card 1: Total Matches -->
<rect x="20"   y="70" width="183" height="72" rx="8" fill="url(#crcard)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
<text x="36"   y="91" font-size="9" fill="#4a5568" letter-spacing=".08em" font-weight="600">TOTAL MATCHES</text>
<text x="36"   y="122" font-size="30" font-weight="800" fill="#00d4ff" filter="url(#crglow1)">1,243</text>

<!-- Card 2: Total Runs -->
<rect x="213"  y="70" width="183" height="72" rx="8" fill="url(#crcard)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
<text x="229"  y="91" font-size="9" fill="#4a5568" letter-spacing=".08em" font-weight="600">TOTAL RUNS</text>
<text x="229"  y="122" font-size="30" font-weight="800" fill="#ffd700" filter="url(#crglow2)">4,01,423</text>

<!-- Card 3: Total Wickets -->
