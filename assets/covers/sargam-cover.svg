<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
<defs>
  <radialGradient id="sgbg" cx="50%" cy="45%" r="75%">
    <stop offset="0%" stop-color="#1a0836"/>
    <stop offset="50%" stop-color="#0d0422"/>
    <stop offset="100%" stop-color="#050210"/>
  </radialGradient>
  <radialGradient id="sgglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity=".45"/>
    <stop offset="60%" stop-color="#7c3aed" stop-opacity=".12"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="sgpinkglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#db2777" stop-opacity=".3"/>
    <stop offset="100%" stop-color="#db2777" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="sgscreen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#150830"/>
    <stop offset="100%" stop-color="#0a0420"/>
  </linearGradient>
  <linearGradient id="sgart1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#db2777"/>
  </linearGradient>
  <linearGradient id="sgart2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#059669"/>
    <stop offset="100%" stop-color="#0d9488"/>
  </linearGradient>
  <linearGradient id="sgart3" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#d97706"/>
    <stop offset="100%" stop-color="#dc2626"/>
  </linearGradient>
  <linearGradient id="sgart4" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2563eb"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>
  <linearGradient id="sgart5" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#db2777"/>
    <stop offset="100%" stop-color="#9333ea"/>
  </linearGradient>
  <linearGradient id="sgprogress" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#db2777"/>
  </linearGradient>
  <linearGradient id="sgwave" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity=".6"/>
    <stop offset="100%" stop-color="#db2777" stop-opacity=".8"/>
  </linearGradient>
  <clipPath id="sgclip"><rect width="264" height="540" rx="38"/></clipPath>
  <filter id="sgdrop"><feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#7c3aed" flood-opacity=".35"/></filter>
  <filter id="sggf" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="60"/></filter>
  <filter id="sgblur" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="20"/></filter>
</defs>

<!-- BG -->
<rect width="1200" height="700" fill="url(#sgbg)"/>

<!-- Ambient glows -->
<ellipse cx="600" cy="360" rx="380" ry="280" fill="url(#sgglow)" filter="url(#sggf)"/>
<ellipse cx="900" cy="200" rx="200" ry="160" fill="url(#sgpinkglow)" filter="url(#sggf)"/>
<ellipse cx="200" cy="500" rx="200" ry="140" fill="#db2777" fill-opacity=".1" filter="url(#sggf)"/>

<!-- Vinyl rings (very faint, behind everything) -->
<circle cx="600" cy="350" r="320" fill="none" stroke="#7c3aed" stroke-opacity=".06" stroke-width="1"/>
<circle cx="600" cy="350" r="270" fill="none" stroke="#7c3aed" stroke-opacity=".06" stroke-width="1"/>
<circle cx="600" cy="350" r="220" fill="none" stroke="#7c3aed" stroke-opacity=".07" stroke-width="1"/>
<circle cx="600" cy="350" r="170" fill="none" stroke="#7c3aed" stroke-opacity=".08" stroke-width="1"/>

<!-- ─── FLOATING ALBUM CIRCLES ─── -->
<!-- Large circle, back-right -->
<circle cx="1040" cy="160" r="78" fill="url(#sgart3)" opacity=".55" filter="url(#sgblur)"/>
<circle cx="1040" cy="160" r="78" fill="url(#sgart3)" opacity=".3"/>
<circle cx="1040" cy="160" r="28" fill="#0a0420" fill-opacity=".7"/>
<circle cx="1040" cy="160" r="8" fill="#0a0420"/>

<!-- Small circle, top-left -->
<circle cx="158" cy="130" r="52" fill="url(#sgart4)" opacity=".5" filter="url(#sgblur)"/>
<circle cx="158" cy="130" r="52" fill="url(#sgart4)" opacity=".25"/>
<circle cx="158" cy="130" r="18" fill="#0a0420" fill-opacity=".7"/>

<!-- Medium, bottom-right -->
<circle cx="1020" cy="540" r="64" fill="url(#sgart2)" opacity=".55" filter="url(#sgblur)"/>
<circle cx="1020" cy="540" r="64" fill="url(#sgart2)" opacity=".3"/>
<circle cx="1020" cy="540" r="22" fill="#0a0420" fill-opacity=".7"/>

<!-- Tiny, top-right -->
<circle cx="870" cy="90" r="32" fill="url(#sgart5)" opacity=".5" filter="url(#sgblur)"/>
<circle cx="870" cy="90" r="32" fill="url(#sgart5)" opacity=".3"/>

<!-- Medium, bottom-left -->
<circle cx="140" cy="560" r="56" fill="url(#sgart1)" opacity=".45" filter="url(#sgblur)"/>
<circle cx="140" cy="560" r="56" fill="url(#sgart1)" opacity=".25"/>
<circle cx="140" cy="560" r="20" fill="#0a0420" fill-opacity=".7"/>

<!-- ─── LEFT TEXT (behind phone, large ghost text) ─── -->
<text x="50" y="490" font-size="200" font-weight="900" fill="#7c3aed" fill-opacity=".06" letter-spacing="-.06em">♫</text>

<!-- ─── PHONE FRAME ─── -->
<g transform="translate(468,72)" filter="url(#sgdrop)">
  <rect x="-2" y="-2" width="268" height="544" rx="40" fill="#2a1050"/>
  <rect width="264" height="540" rx="38" fill="#12062a"/>
  <g clip-path="url(#sgclip)">
    <rect width="264" height="540" fill="url(#sgscreen)"/>

    <!-- Status bar -->
    <rect width="264" height="42" fill="#0a0420" fill-opacity=".95"/>
    <text x="20" y="28" font-size="12" font-weight="600" fill="#a78bfa">9:41</text>
    <rect x="92" y="8" width="80" height="24" rx="12" fill="#000"/>
    <text x="244" y="28" text-anchor="end" font-size="10" fill="#a78bfa">●●●</text>

    <!-- AI label -->
    <rect x="16" y="50" width="68" height="20" rx="10" fill="#7c3aed" fill-opacity=".2"/>
    <text x="50" y="64" text-anchor="middle" font-size="9" font-weight="700" fill="#a78bfa" letter-spacing=".08em">✦ AI PICK</text>

    <!-- Album art (large square) -->
    <rect x="16" y="76" width="232" height="192" rx="20" fill="url(#sgart1)"/>
    <!-- Record centre -->
    <circle cx="132" cy="172" r="34" fill="#0a0420" fill-opacity=".5"/>
    <circle cx="132" cy="172" r="10" fill="#0a0420" fill-opacity=".9"/>
    <!-- Music note symbol on art -->
    <text x="132" y="108" text-anchor="middle" font-size="48" fill="#fff" fill-opacity=".3">♫</text>

    <!-- Song info -->
    <text x="16" y="290" font-size="17" font-weight="800" fill="#e9d5ff">Kesariya (Remix)</text>
    <text x="16" y="310" font-size="12" fill="#8b5cf6">Arijit Singh · Brahmāstra</text>

    <!-- Like + more -->
    <text x="236" y="302" text-anchor="middle" font-size="20">♡</text>

    <!-- Progress bar -->
    <rect x="16" y="324" width="232" height="4" rx="2" fill="#2d1666"/>
    <rect x="16" y="324" width="96" height="4" rx="2" fill="url(#sgprogress)"/>
    <circle cx="112" cy="326" r="7" fill="#fff"/>
    <text x="16" y="342" font-size="9" fill="#6d28d9">1:38</text>
    <text x="248" y="342" text-anchor="end" font-size="9" fill="#6d28d9">4:12</text>

    <!-- Controls -->
    <text x="40" y="376" text-anchor="middle" font-size="22" fill="#8b5cf6">⇄</text>
    <text x="84" y="378" text-anchor="middle" font-size="28" fill="#a78bfa">⏮</text>
    <!-- Play button -->
    <circle cx="132" cy="366" r="26" fill="url(#sgart1)"/>
    <text x="134" y="374" text-anchor="middle" font-size="24" fill="#fff">▶</text>
    <text x="180" y="378" text-anchor="middle" font-size="28" fill="#a78bfa">⏭</text>
    <text x="224" y="376" text-anchor="middle" font-size="22" fill="#8b5cf6">↻</text>

    <!-- Waveform bars -->
    <g transform="translate(16,404)">
      <rect x="0"   y="20" width="7" height="16" rx="3" fill="url(#sgwave)"/>
      <rect x="11"  y="10" width="7" height="26" rx="3" fill="url(#sgwave)"/>
      <rect x="22"  y="4"  width="7" height="32" rx="3" fill="url(#sgwave)"/>
      <rect x="33"  y="14" width="7" height="22" rx="3" fill="url(#sgwave)"/>
      <rect x="44"  y="8"  width="7" height="28" rx="3" fill="url(#sgwave)"/>
      <rect x="55"  y="18" width="7" height="18" rx="3" fill="url(#sgwave)"/>
      <rect x="66"  y="2"  width="7" height="34" rx="3" fill="url(#sgwave)"/>
      <rect x="77"  y="12" width="7" height="24" rx="3" fill="url(#sgwave)"/>
      <rect x="88"  y="6"  width="7" height="30" rx="3" fill="url(#sgwave)"/>
      <rect x="99"  y="20" width="7" height="16" rx="3" fill="url(#sgwave)" fill-opacity=".5"/>
      <rect x="110" y="16" width="7" height="20" rx="3" fill="url(#sgwave)" fill-opacity=".5"/>
      <rect x="121" y="10" width="7" height="26" rx="3" fill="url(#sgwave)" fill-opacity=".4"/>
      <rect x="132" y="18" width="7" height="18" rx="3" fill="url(#sgwave)" fill-opacity=".35"/>
      <rect x="143" y="8"  width="7" height="28" rx="3" fill="url(#sgwave)" fill-opacity=".3"/>
      <rect x="154" y="14" width="7" height="22" rx="3" fill="url(#sgwave)" fill-opacity=".25"/>
      <rect x="165" y="20" width="7" height="16" rx="3" fill="url(#sgwave)" fill-opacity=".2"/>
      <rect x="176" y="12" width="7" height="24" rx="3" fill="url(#sgwave)" fill-opacity=".2"/>
      <rect x="187" y="18" width="7" height="18" rx="3" fill="url(#sgwave)" fill-opacity=".15"/>
      <rect x="198" y="6"  width="7" height="30" rx="3" fill="url(#sgwave)" fill-opacity=".15"/>
      <rect x="209" y="14" width="7" height="22" rx="3" fill="url(#sgwave)" fill-opacity=".12"/>
      <rect x="220" y="20" width="7" height="16" rx="3" fill="url(#sgwave)" fill-opacity=".1"/>
    </g>

    <!-- Bottom tabs -->
    <rect x="0" y="490" width="264" height="50" fill="#08041a"/>
    <line x1="0" y1="490" x2="264" y2="490" stroke="#2d1666" stroke-width="1"/>
    <text x="33"  y="518" text-anchor="middle" font-size="18">🏠</text>
    <text x="99"  y="518" text-anchor="middle" font-size="18">🔍</text>
    <text x="165" y="515" text-anchor="middle" font-size="22">♫</text>
    <circle cx="165" cy="524" r="3" fill="#7c3aed"/>
    <text x="231" y="518" text-anchor="middle" font-size="18">👤</text>
    <rect x="92" y="536" width="80" height="4" rx="2" fill="#2d1666"/>
  </g>
  <!-- Island -->
  <rect x="92" y="8" width="80" height="24" rx="12" fill="#000"/>
</g>

<!-- ─── RIGHT TEXT PANEL ─── -->
<!-- Tags -->
<rect x="776" y="256" width="76" height="24" rx="12" fill="#7c3aed" fill-opacity=".18"/>
<text x="814" y="272" text-anchor="middle" font-size="10" font-weight="700" fill="#a78bfa" letter-spacing=".08em">MOBILE</text>
<rect x="862" y="256" width="50" height="24" rx="12" fill="#db2777" fill-opacity=".15"/>
<text x="887" y="272" text-anchor="middle" font-size="10" font-weight="700" fill="#f472b6" letter-spacing=".08em">iOS</text>
<rect x="922" y="256" width="60" height="24" rx="12" fill="#7c3aed" fill-opacity=".18"/>
<text x="952" y="272" text-anchor="middle" font-size="10" font-weight="700" fill="#a78bfa" letter-spacing=".08em">AI/ML</text>

<!-- Title -->
<text x="776" y="370" font-size="100" font-weight="900" fill="#e9d5ff" letter-spacing="-.05em">Sargam</text>
<text x="778" y="408" font-size="16" fill="#6d28d9">AI-powered music discovery</text>

<!-- Divider -->
<rect x="776" y="428" width="240" height="1" fill="#7c3aed" fill-opacity=".3"/>

<!-- Metrics -->
<text x="776" y="468" font-size="34" font-weight="800" fill="#e9d5ff">92%</text>
<text x="776" y="488" font-size="11" fill="#6d28d9" letter-spacing=".04em">DISCOVERY RATE</text>
<text x="906" y="468" font-size="34" font-weight="800" fill="#e9d5ff">4.7★</text>
<text x="906" y="488" font-size="11" fill="#6d28d9" letter-spacing=".04em">USER SCORE</text>

<!-- Bottom label -->
<text x="776" y="620" font-size="12" fill="#3b0764" font-weight="500" letter-spacing=".12em">CASE STUDY · UI/UX DESIGN</text>
</svg>